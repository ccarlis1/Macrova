name: macrova
description: Macrova - Nutrition Meal Planning App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/dev/server_recipes.json
    - assets/dev/cached_ingredients.json
    - assets/dev/user_profile.yaml
