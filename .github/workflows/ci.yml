name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/grocery-optimizer/package-lock.json

      - name: Build grocery-optimizer (dist/run.js)
        run: |
          npm ci
          npm run build
        working-directory: packages/grocery-optimizer

      - name: Pytest
        env:
          USDA_API_KEY: ci-test-usda-key
        run: python -m pytest tests/ -q

      - name: OpenAPI contract (no drift)
        env:
          USDA_API_KEY: ci-test-usda-key
        run: python scripts/export_openapi.py --check
