# User Profile Configuration
# Copy this file to user_profile.yaml and customize for your needs.
#
# CLI usage:
#   python3 -m src.cli --profile config/user_profile.yaml
#   python3 -m src.cli --profile config/user_profile.yaml --days 3 --output json
#
# Sample data (ingredient names in recipes must exist in your ingredients file):
#   config/recipes.example.json   — example recipes
#   config/ingredients.example.json — example ingredients (use with --ingredients)
# To try with samples:
#   python3 -m src.cli --profile config/user_profile.yaml \
#     --recipes config/recipes.example.json \
#     --ingredients config/ingredients.example.json

nutrition_goals:
  # Daily calorie target (kcal)
  daily_calories: 2400

  # Protein target (grams per day). Typical: 0.7–0.8g per lb bodyweight
  daily_protein_g: 150

  # Fat target range (grams per day). Common range: 50–100g
  daily_fat_g:
    min: 50
    max: 100

  # Carbs are derived: (calories - protein*4 - fat*9) / 4
  # using the median of the fat range

  # OPTIONAL: Hard maximum daily calories (Calorie Deficit Mode)
  # When set, plans exceeding this are rejected. Uncomment to enable:
  # max_daily_calories: 2200

  # τ: fraction of prorated weekly micronutrient RDI required (tracked nutrients only). 1.0 = strict; below relaxes the weekly floor.
  micronutrient_weekly_min_fraction: 0.85

schedule:
  # Format: "HH:MM": busyness_level (integer)
  # Busyness levels (max cooking time per slot):
  #   1 = snack (≤ 5 min)
  #   2 = quick meal (≤ 15 min)
  #   3 = weeknight meal (≤ 30 min)
  #   4 = weekend / meal prep (30+ min)
  #   0 = workout time (not a meal slot; used for context)
  #
  # The first three time slots (by time order) are treated as breakfast, lunch, dinner.
  # Schedule is replicated for each day when using --days 2 to 7.
  "07:00": 1   # Breakfast: quick meal
  "12:00": 4   # Lunch: weeknight meal
  "18:00": 4   # Dinner: weeknight meal
  "08:00": 0   # Workout (optional)

preferences:
  liked_foods:
    - "salmon"
    - "egg"
    - "rice"
    - "potatoes"
    - "chicken"
    - "broccoli"
    - "blueberries"

  disliked_foods:
    - "brussels sprouts"
    - "liver"

  allergies:
    - "shellfish"
    - "peanuts"

demographic: "adult_male"

# Daily RDI targets (previously weekly_targets with values = daily × 7)
micronutrient_goals:
